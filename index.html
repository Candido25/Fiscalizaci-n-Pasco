<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO y Redes Sociales -->
    <title>Lic. Jannet Paredes #1 - PRIN Pasco | Por un Perú sin miedo</title>
    <meta name="description" content="Dashboard de fiscalización de salud en la región Pasco. Lic. Jannet Paredes, candidata #1 por el PRIN.">
    <meta property="og:title" content="Lic. Jannet Paredes #1 - PRIN Pasco">
    <meta property="og:description" content="Por un Perú sin miedo. Registra tu denuncia de salud aquí.">
    <meta property="og:image" content="candidata.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM 18 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para procesar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        .bg-prin-red { background-color: #b91c1c; }
        .bg-prin-dark { background-color: #7f1d1d; }
        .text-prin-red { color: #b91c1c; }
        .border-prin-red { border-color: #b91c1c; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        
        // Componente de Iconos SVG Integrados (Corregido para GitHub/Babel)
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                ShieldCheck: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM9 12l2 2 4-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                User: (
                    <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </g>
                ),
                HeartPulse: <path d="M20.42 4.58a5.4 5.4 0 0 0-7.65 0l-.77.78-.77-.78a5.4 5.4 0 0 0-7.65 0C1.46 6.7 1.33 10.28 4 13l8 8 8-8c2.67-2.72 2.54-6.3.42-8.42zM2 10h4l1.5-4.5L10.5 16 12 10h4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                TrendingUp: <path d="m23 6-9.5 9.5-5-5L1 18M17 6h6v6" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                AlertCircle: (
                    <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v4M12 16h.01"/>
                    </g>
                ),
                Hospital: <path d="M18 22V8a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v14M2 22h20M14 18h-4v4h4v-4zM8 11h8M12 7v8" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                FileText: (
                    <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                    </g>
                ),
                MessageSquare: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                Database: (
                    <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <ellipse cx="12" cy="5" rx="9" ry="3"/>
                        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                    </g>
                ),
                MapPin: (
                    <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </g>
                ),
                Send: <path d="m22 2-7 20-4-9-9-4Zm0 0L11 13" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                Phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.18-2.18a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            };

            return (
                <svg width={size} height={size} viewBox="0 0 24 24" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const PROVINCIAS_DATA = {
            pasco: {
                nombre: "Pasco (Cerro de Pasco)",
                problemas: [
                    "Crisis sanitaria por metales pesados (plomo en sangre) en niños de Simón Bolívar.",
                    "Paralización de la infraestructura del Hospital Regional Antonio Blanco Guardia.",
                    "Colapso de servicios de salud básica por falta de equipamiento técnico especializado."
                ],
                estadisticas: { anemia: 52.4, desnutricion: 18.2, establecimientos: 45 }
            },
            oxapampa: {
                nombre: "Oxapampa",
                problemas: [
                    "Déficit severo de médicos especialistas en Villa Rica y Puerto Bermúdez.",
                    "Falta de laboratorios móviles para detección temprana de enfermedades tropicales.",
                    "Inexistencia de una red de ambulancias fluviales para comunidades alejadas."
                ],
                estadisticas: { anemia: 38.1, desnutricion: 12.5, establecimientos: 32 }
            },
            carrion: {
                nombre: "Daniel Alcides Carrión",
                problemas: [
                    "Altos índices de desnutrición crónica por falta de seguridad alimentaria.",
                    "Puestos de salud en Yanahuanca con infraestructura declarada en alto riesgo.",
                    "Escasez de personal médico residente y falta de insumos farmacéuticos básicos."
                ],
                estadisticas: { anemia: 48.9, desnutricion: 22.1, establecimientos: 28 }
            }
        };

        const App = () => {
            const [selectedProvince, setSelectedProvince] = useState('pasco');
            const [suggestions, setSuggestions] = useState([
                { id: 1, usuario: "Comité Yanacancha", telefono: "963 852 741", provincia: "Pasco", mensaje: "¡Lic. Jannet! Es urgente fiscalizar los fondos para tamizaje de metales pesados.", fecha: "20/05/2024" }
            ]);
            const [newSuggestion, setNewSuggestion] = useState({ usuario: '', telefono: '', provincia: 'Pasco', mensaje: '' });

            const currentData = useMemo(() => PROVINCIAS_DATA[selectedProvince], [selectedProvince]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!newSuggestion.mensaje || !newSuggestion.usuario || !newSuggestion.telefono) return;
                
                const suggestion = {
                    id: Date.now(),
                    usuario: newSuggestion.usuario,
                    telefono: newSuggestion.telefono,
                    provincia: newSuggestion.provincia,
                    mensaje: newSuggestion.mensaje,
                    fecha: new Date().toLocaleDateString()
                };
                
                setSuggestions([suggestion, ...suggestions]);
                setNewSuggestion({ usuario: '', telefono: '', provincia: 'Pasco', mensaje: '' });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Banner Lema PRIN */}
                    <div className="bg-prin-dark text-white text-[10px] md:text-xs py-2 text-center font-black uppercase tracking-[0.4em] italic px-4">
                        "Por un Perú sin miedo" — PRIN Pasco
                    </div>

                    {/* Header Pasco */}
                    <header className="bg-prin-red text-white shadow-2xl border-b-4 border-red-900">
                        <div className="max-w-7xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-white p-3 rounded-xl border-2 border-red-900 flex items-center justify-center">
                                    <span className="text-red-700 font-black text-4xl italic leading-none">PRIN</span>
                                </div>
                                <div className="text-center md:text-left">
                                    <h1 className="text-3xl font-black tracking-tighter uppercase italic leading-none">Lic. Jannet Paredes</h1>
                                    <p className="text-red-100 text-sm font-bold mt-1 uppercase tracking-widest">
                                        Diputada por <span className="bg-white text-red-700 px-2 rounded">Pasco</span> • <span className="text-white underline decoration-white underline-offset-4">Número 1</span>
                                    </p>
                                </div>
                            </div>
                            
                            <div className="flex flex-col items-center md:items-end">
                                <div className="bg-white text-red-700 px-6 py-2 rounded-full border-2 border-red-900 shadow-xl flex items-center gap-2">
                                    <Icon name="ShieldCheck" size={20} />
                                    <span className="text-sm font-black uppercase italic tracking-tight">Por un Perú sin miedo</span>
                                </div>
                                <p className="text-red-100 text-[10px] font-bold mt-2 uppercase tracking-tighter">Fiscalización Regional Pasco</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8 flex-grow w-full">
                        
                        {/* Perfil Candidata - Usa candidata.png */}
                        <div className="lg:col-span-1">
                            <div className="bg-white rounded-3xl shadow-2xl border-2 border-red-600 overflow-hidden sticky top-8">
                                <div className="aspect-[3/4] bg-slate-100 relative overflow-hidden">
                                    <img 
                                        src="candidata.png" 
                                        alt="Lic. Jannet Paredes" 
                                        className="w-full h-full object-cover"
                                        onError={(e) => {
                                            e.target.style.display = 'none';
                                            e.target.nextSibling.style.display = 'flex';
                                        }}
                                    />
                                    <div className="hidden absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-6 text-center bg-slate-100">
                                        <Icon name="User" size={64} className="mb-4 text-red-100" />
                                        <p className="text-[10px] font-black uppercase text-red-800 tracking-widest leading-none">Lic. Jannet Paredes</p>
                                        <p className="text-[9px] font-bold mt-2 leading-tight px-4 text-slate-500 italic">
                                            (Asegúrate de subir el archivo candidata.png)
                                        </p>
                                    </div>
                                    <div className="absolute bottom-0 right-0 bg-red-700 text-white w-20 h-20 flex items-center justify-center rounded-tl-3xl border-t-4 border-l-4 border-white shadow-xl z-10">
                                        <span className="text-5xl font-black italic leading-none">1</span>
                                    </div>
                                </div>
                                <div className="p-6 bg-red-700 text-white text-center">
                                    <p className="text-[9px] font-black uppercase tracking-[0.2em] mb-2 text-red-200 italic">"Por un Perú sin miedo"</p>
                                    <h2 className="text-xl font-black uppercase mb-1 leading-none tracking-tighter">Lic. Jannet Paredes</h2>
                                    <p className="text-xs font-bold text-red-100 uppercase opacity-80 italic">La fuerza de Pasco</p>
                                </div>
                            </div>
                        </div>

                        {/* Diagnóstico Regional Salud */}
                        <div className="lg:col-span-2 space-y-6">
                            <section className="bg-white rounded-3xl shadow-sm p-6 border-t-8 border-red-700 border-x border-b border-slate-100">
                                <div className="flex flex-col md:flex-row items-center justify-between mb-8 gap-4 pb-4 border-b">
                                    <h2 className="text-2xl font-black text-red-800 flex items-center gap-2 uppercase italic tracking-tighter leading-none">
                                        <Icon name="HeartPulse" size={32} className="text-red-600" /> Salud Pasco
                                    </h2>
                                    <div className="flex flex-wrap gap-2 justify-center">
                                        {Object.keys(PROVINCIAS_DATA).map(key => (
                                            <button
                                                key={key}
                                                onClick={() => setSelectedProvince(key)}
                                                className={`px-4 py-2 rounded-xl text-[10px] font-black transition-all border-2 uppercase tracking-tighter ${
                                                    selectedProvince === key 
                                                    ? 'bg-red-700 text-white border-red-900 shadow-lg scale-105' 
                                                    : 'bg-white text-slate-400 border-slate-100 hover:border-red-400'
                                                }`}
                                            >
                                                {PROVINCIAS_DATA[key].nombre.split(' ')[0]}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 text-center">
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-inner">
                                        <span className="text-[9px] font-black text-slate-400 uppercase block tracking-widest mb-1">Anemia Infantil</span>
                                        <p className="text-4xl font-black text-red-700 leading-none">{currentData.estadisticas.anemia}%</p>
                                        <Icon name="TrendingUp" size={14} className="text-red-300 mx-auto mt-2" />
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-inner">
                                        <span className="text-[9px] font-black text-slate-400 uppercase block tracking-widest mb-1">Desnutrición</span>
                                        <p className="text-4xl font-black text-red-700 leading-none">{currentData.estadisticas.desnutricion}%</p>
                                        <Icon name="AlertCircle" size={14} className="text-red-300 mx-auto mt-2" />
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-2xl border text-prin-red shadow-inner">
                                        <span className="text-[9px] font-black text-slate-400 uppercase block tracking-widest mb-1">Establecimientos</span>
                                        <p className="text-4xl font-black text-red-700 leading-none">{currentData.estadisticas.establecimientos}</p>
                                        <Icon name="Hospital" size={14} className="text-red-300 mx-auto mt-2" />
                                    </div>
                                </div>

                                <div className="bg-red-50/50 p-6 rounded-2xl border border-red-100">
                                    <h3 className="font-black text-red-900 uppercase text-xs mb-4 flex items-center gap-2 italic tracking-widest leading-none">
                                        <Icon name="FileText" size={16} /> Prioridades de Fiscalización:
                                    </h3>
                                    <div className="space-y-4">
                                        {currentData.problemas.map((prob, idx) => (
                                            <div key={idx} className="flex gap-4 p-4 bg-white rounded-xl border-l-4 border-red-700 shadow-sm group hover:bg-red-50 transition-colors duration-300">
                                                <span className="flex-shrink-0 w-8 h-8 rounded-full bg-red-700 text-white flex items-center justify-center font-black text-xs">{idx + 1}</span>
                                                <p className="text-slate-700 font-bold italic text-sm leading-snug">{prob}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>

                            {/* Buzón de Fiscalización - Base de Datos */}
                            <section className="bg-red-800 text-white rounded-3xl shadow-2xl p-8 border-b-8 border-red-950 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10">
                                    <Icon name="ShieldCheck" size={120} />
                                </div>
                                <div className="flex items-center gap-4 mb-6 relative z-10">
                                    <div className="bg-white p-3 rounded-2xl shadow-inner border border-red-100">
                                        <Icon name="MessageSquare" size={32} className="text-red-700" />
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-black uppercase tracking-tighter italic leading-none">Buzón Ciudadano Pasco</h2>
                                        <p className="text-red-200 text-xs font-bold uppercase tracking-widest mt-1 italic leading-none">Para un Pasco sin miedo</p>
                                    </div>
                                </div>
                                
                                <form onSubmit={handleSubmit} className="space-y-4 relative z-10">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-red-200 ml-1 leading-none">Nombre Completo</label>
                                            <input 
                                                type="text" 
                                                placeholder="Tu Nombre"
                                                className="w-full bg-red-900 border-2 border-red-500 rounded-xl p-4 text-white placeholder-red-300 focus:bg-white focus:text-red-900 outline-none font-bold transition-all duration-300"
                                                value={newSuggestion.usuario}
                                                onChange={(e) => setNewSuggestion({...newSuggestion, usuario: e.target.value})}
                                            />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-red-200 ml-1 leading-none">WhatsApp / Celular</label>
                                            <input 
                                                type="tel" 
                                                placeholder="999 999 999"
                                                className="w-full bg-red-900 border-2 border-red-500 rounded-xl p-4 text-white placeholder-red-300 focus:bg-white focus:text-red-900 outline-none font-bold transition-all duration-300"
                                                value={newSuggestion.telefono}
                                                onChange={(e) => setNewSuggestion({...newSuggestion, telefono: e.target.value})}
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-red-200 ml-1 leading-none">Provincia</label>
                                        <select 
                                            className="w-full bg-red-900 border-2 border-red-500 rounded-xl p-4 text-white focus:bg-white focus:text-red-900 outline-none font-bold transition-all duration-300 cursor-pointer"
                                            value={newSuggestion.provincia}
                                            onChange={(e) => setNewSuggestion({...newSuggestion, provincia: e.target.value})}
                                        >
                                            <option>Pasco</option>
                                            <option>Oxapampa</option>
                                            <option>Daniel Alcides Carrión</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-red-200 ml-1 leading-none">Mensaje / Recomendación</label>
                                        <textarea 
                                            placeholder="Escribe la problemática de salud a fiscalizar..."
                                            rows="3"
                                            className="w-full bg-red-900 border-2 border-red-500 rounded-xl p-4 text-white placeholder-red-300 focus:bg-white focus:text-red-900 outline-none font-bold transition-all duration-300"
                                            value={newSuggestion.mensaje}
                                            onChange={(e) => setNewSuggestion({...newSuggestion, mensaje: e.target.value})}
                                        ></textarea>
                                    </div>
                                    <button className="w-full bg-white text-red-800 font-black py-5 rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-100 transition-all uppercase italic shadow-xl">
                                        <Icon name="Send" size={20} /> Registrarse y Sumar a la Agenda
                                    </button>
                                </form>
                            </section>
                        </div>

                        {/* Columna Derecha: Agenda y Base de Datos Visual */}
                        <div className="lg:col-span-1 space-y-6">
                            <section className="bg-slate-100 rounded-3xl p-6 border h-full flex flex-col shadow-inner border-slate-200">
                                <h2 className="text-[10px] font-black mb-6 border-b border-slate-300 pb-4 text-slate-500 uppercase tracking-[0.2em] flex items-center gap-2">
                                    <Icon name="Database" size={14} className="text-red-600" /> Agenda de Pasco
                                </h2>
                                <div className="space-y-4 flex-grow overflow-y-auto pr-2 custom-scrollbar max-h-[750px]">
                                    {suggestions.length === 0 ? (
                                        <p className="text-center text-slate-400 py-12 text-xs font-bold uppercase opacity-50 italic leading-none">Esperando registros...</p>
                                    ) : (
                                        suggestions.map(s => (
                                            <div key={s.id} className="p-4 bg-white rounded-2xl border border-slate-200 hover:border-red-500 transition-all duration-300 shadow-sm group">
                                                <div className="flex justify-between items-start mb-2">
                                                    <span className="text-[10px] font-black text-red-700 uppercase italic tracking-tighter flex items-center gap-1">
                                                        <Icon name="MapPin" size={10} /> {s.provincia}
                                                    </span>
                                                    <span className="text-[9px] text-slate-400 font-bold">{s.fecha}</span>
                                                </div>
                                                <p className="text-xs text-slate-800 font-bold italic leading-relaxed mb-3 group-hover:text-red-700 line-clamp-2">"{s.mensaje}"</p>
                                                <div className="mt-3 flex flex-col gap-1 pt-3 border-t border-slate-50">
                                                    <div className="flex items-center gap-2">
                                                        <div className="w-5 h-5 bg-red-700 rounded-full flex items-center justify-center text-[10px] font-black text-white shrink-0">
                                                            {s.usuario.charAt(0)}
                                                        </div>
                                                        <span className="text-[10px] font-black text-slate-600 uppercase tracking-tighter truncate">{s.usuario}</span>
                                                    </div>
                                                    <div className="flex items-center gap-2 text-prin-red ml-1">
                                                        <Icon name="Phone" size={10} />
                                                        <span className="text-[10px] font-bold tracking-tighter leading-none">{s.telefono}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="mt-8 p-6 bg-red-700 rounded-2xl text-center text-white shadow-xl border-b-4 border-red-900">
                                    <p className="text-3xl font-black leading-none">{suggestions.length}</p>
                                    <p className="text-[9px] font-black uppercase opacity-70 italic tracking-widest mt-1 tracking-tighter leading-none">Contactos para Fiscalizar</p>
                                </div>
                            </section>
                        </div>
                    </main>

                    {/* Footer Oficial Pasco */}
                    <footer className="bg-slate-900 text-white p-12 text-center mt-12 border-t-8 border-red-700 relative">
                        <div className="max-w-4xl mx-auto space-y-4">
                           <div className="text-red-600 font-black text-6xl italic mb-4 tracking-tighter opacity-80 leading-none select-none">PRIN</div>
                           <p className="text-white text-xl font-black uppercase tracking-[0.4em] italic mb-6 leading-none">"Por un Perú sin miedo"</p>
                           <h3 className="text-3xl font-black uppercase italic tracking-tighter leading-none mb-4">Lic. Jannet Pilar Paredes Sanchez</h3>
                           <div className="w-24 h-1 bg-red-700 mx-auto my-6"></div>
                           <p className="text-slate-400 max-w-xl mx-auto text-sm leading-relaxed font-medium italic">
                             "Como candidata por Pasco, mi compromiso es fiscalizar con firmeza cada centavo destinado a la salud. Este dashboard es tu espacio para denunciar y ser escuchado."
                           </p>
                           <div className="pt-8 flex justify-center gap-12">
                              <div className="text-center">
                                <p className="text-4xl font-black text-red-600 italic leading-none">PASCO</p>
                                <p className="text-[10px] font-black tracking-widest opacity-60 uppercase mt-2 leading-none">Circunscripción</p>
                              </div>
